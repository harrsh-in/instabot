services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: instagram-webhook-app:latest
    container_name: instagram-webhook
    restart: unless-stopped
    # Bind to localhost only - nginx will proxy to this
    # External traffic cannot reach the container directly
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app-data:
