services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: instagram-webhook-app:latest
    container_name: instagram-webhook
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app-data:/app/instance
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app-data:
  app-logs:
